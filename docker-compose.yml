services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      MOCK_LLM_URL: http://mock-llm:8080
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      BOUNDARY_LAYER_REDIS_LIVE: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: boundary_layer
      POSTGRES_PASSWORD: boundary_layer_local
      POSTGRES_DB: boundary_layer
      BOUNDARY_LAYER_POSTGRES_LIVE: "true"
      SESSION_HMAC_SECRET: local-dev-hmac-secret-change-me
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mock-llm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mock-llm:
    build:
      context: .
      dockerfile: apps/mock_llm/Dockerfile
    ports:
      - "8080:8080"
    environment:
      MOCK_LLM_HOST: 0.0.0.0
      MOCK_LLM_PORT: 8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  alert-webhook:
    build:
      context: .
      dockerfile: apps/alert_webhook/Dockerfile
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: boundary_layer
      POSTGRES_PASSWORD: boundary_layer_local
      POSTGRES_DB: boundary_layer
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boundary_layer -d boundary_layer"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./detections/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./detections/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      api:
        condition: service_healthy
      alertmanager:
        condition: service_healthy

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./detections/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --web.external-url=http://localhost:9093
    depends_on:
      alert-webhook:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
