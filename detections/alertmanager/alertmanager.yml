global:
  resolve_timeout: 1m

route:
  receiver: boundary-layer-local-webhook
  group_by:
    - alertname
    - severity
  group_wait: 1s
  group_interval: 5s
  repeat_interval: 1m

receivers:
  - name: boundary-layer-local-webhook
    webhook_configs:
      - url: http://alert-webhook:8080/alerts
        send_resolved: true

  - name: pager-placeholder
    webhook_configs:
      - url: http://alert-webhook:8080/alerts
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: page
    target_match:
      severity: warning
    equal: [alertname]
