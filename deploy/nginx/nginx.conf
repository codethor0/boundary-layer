worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    upstream boundary_layer_api {
        server api:8000;
    }

    upstream boundary_layer_prometheus {
        server prometheus:9090;
    }

    upstream boundary_layer_alertmanager {
        server alertmanager:9093;
    }

    server {
        listen 8443 ssl;
        server_name boundary-layer.local;

        ssl_certificate /etc/nginx/certs/boundary-layer.crt;
        ssl_certificate_key /etc/nginx/certs/boundary-layer.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;

        location / {
            proxy_pass http://boundary_layer_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            limit_req zone=api_limit burst=60 nodelay;
        }

        location /prometheus/ {
            proxy_pass http://boundary_layer_prometheus/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /alertmanager/ {
            proxy_pass http://boundary_layer_alertmanager/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
